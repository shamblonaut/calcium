<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="display">
        <p class="calculation">78 × 9</p>
        <p class="result">702</p>
      </div>
      <div class="buttons">
        <button id="btn-clear" class="btn-fun">C</button>
        <button id="btn-invert" class="btn-fun">±</button>
        <button id="btn-percent" class="btn-fun">%</button>
        <button id="btn-div" class="btn-op">÷</button>
        <button class="btn-num">7</button>
        <button class="btn-num">8</button>
        <button class="btn-num">9</button>
        <button id="btn-mul" class="btn-op">×</button>
        <button class="btn-num">4</button>
        <button class="btn-num">5</button>
        <button class="btn-num">6</button>
        <button id="btn-minus" class="btn-op">−</button>
        <button class="btn-num">1</button>
        <button class="btn-num">2</button>
        <button class="btn-num">3</button>
        <button id="btn-plus" class="btn-op">+</button>
        <button id="btn-0" class="btn-num">0</button>
        <button id="btn-decimal" class="btn-num">.</button>
        <button id="btn-eq" class="btn-op">=</button>
      </div>
    </div>
  </body>
</html>
